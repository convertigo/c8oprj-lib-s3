comment: Sequence to download an object from S3 bucket. Calls getObject transaction with bucket name and object key to retrieve.
↓signS3Request [steps.SimpleStep-1781599617382]: 
  comment: Compute AWS Signature V4 headers for the S3 request.
  expression: |
    'include("js/s3_sigv4.js");
    var signingRegion = String(region || "").trim();
    if (!signingRegion.match(/^[a-z]{2}-[a-z]+-[0-9]+$/)) {
      signingRegion = "us-east-1";
    }
    region = signingRegion;
    var s3SignedHeaders = C8O.s3SigV4.sign({
      method: "GET",
      path: "/" + String(bucketName || "") + "/" + String(objectKey || ""),
      query: {},
      accessKey: accessKey,
      secretKey: secretKey,
      region: signingRegion,
      sessionToken: sessionToken
    });
    __header_Authorization = s3SignedHeaders.authorization;
    __header_x_amz_date = s3SignedHeaders.amzDate;
    __header_x_amz_content_sha256 = s3SignedHeaders.contentSha256;
    __header_x_amz_security_token = s3SignedHeaders.securityToken || null;'
