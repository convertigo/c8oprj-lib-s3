  comment: 'Amazon S3 helper library for Convertigo. Usage: configure the project symbols lib_s3.s3.accessKey, lib_s3.s3.secretKey.secret, lib_s3.s3.region, and optionally lib_s3.s3.sessionToken.secret for temporary AWS credentials. Public sequences: listBuckets, createBucket, putObject, listObjects, getObject, deleteObject, deleteBucket. For putObject, pass bucketName, objectKey, contentType, and provide fileContent as a file upload variable; Convertigo stores the upload as a temporary file and sends it as the S3 PUT body. AWS Signature V4 headers are computed automatically by the sequences and passed to transactions through __header_Authorization, __header_x_amz_date, __header_x_amz_content_sha256, and optional __header_x_amz_security_token. Run s3_regression_test after configuration changes to validate create/upload/list/get/delete cleanup.'
